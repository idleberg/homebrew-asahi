name: Audit & Install Formulae

on:
  push:
    branches:
      - main
    paths:
    - '.github/workflows/audit-formula.yml'
    - 'Formula/**'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ${{ matrix.os }}

    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1

    - name: Cache Homebrew downloads
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: |
          ~/Library/Caches/Homebrew
          ~/.cache/Homebrew
        key: homebrew-${{ runner.os }}-${{ hashFiles('Formula/**') }}
        restore-keys: |
          homebrew-${{ runner.os }}-

    - name: Install Homebrew
      if: matrix.os == 'ubuntu-latest'
      uses: Homebrew/actions/setup-homebrew@main

    - name: Update Homebrew
      if: matrix.os != 'ubuntu-latest'
      run: brew update --auto-update

    - name: Install Go
      run: |
        brew uninstall --force go@1.21
        brew cleanup -s go@1.21
        brew cleanup --prune-prefix
        brew install --force go

    - name: Tap Repository
      run: brew tap idleberg/asahi

    - name: Audit Formulae
      run: |
        for file in ./Formula/*.rb
        do
          echo "Auditing formula $file"
          brew audit idleberg/asahi/$(basename ${file%.rb}) --online --formula
        done

    - name: Install Formulae
      env:
        npm_config_min_release_age: 0
      run: |
        for file in ./Formula/*.rb
        do
          echo "Installing formula $file"
          brew install idleberg/asahi/$(basename ${file%.rb}) --build-from-source --formula
        done

    - name: Test Formulae
      run: |
        for file in ./Formula/*.rb
        do
          echo "Testing formula $file"
          brew test $(basename ${file%.rb})
        done

    - name: Cleanup
      run: brew cleanup --prune=all
